<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .input-group {
            position: relative; 
        }

        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            background-color: white;
            border: 1px solid #ced4da;
            border-top: none;
            border-radius: 0 0 0.375rem 0.375rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .dropdown-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .dropdown-item:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Smart Pantry</span>
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div id="pantry-section" class="mb-5">
            <h2 class="mb-3">Manage Pantry</h2>

            <div class="input-group mb-3">
                <input type="text" id="new-item-name" class="form-control" placeholder="Search for ingredients...">
                <button class="btn btn-primary" type="button" onclick="addToPantry()">Add to Pantry</button>
            </div>

            <div id="pantry-list">
                <p class="text-muted">Loading pantry...</p>
            </div>
        </div>

        <div id="recipe-section">
            <h2 class="mb-3">Suggest Recipes</h2>
            <button class="btn btn-success mb-3" onclick="getRecipes()">Find Recipes</button>

            <div id="recipes-list">
                <p class="text-muted">Click to see recipes</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/scripts/home.js"></script>
</body>
</html>
